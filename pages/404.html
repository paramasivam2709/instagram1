<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Stackly</title>

<style>
:root{
    --bg:#050f2c;
    --card:#1e293b;
    --accent:#f43f5e;
    --secondary:#3b82f6;
    --text:#ffffff;
    --text-muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    radial-gradient(circle at top left, rgba(244,63,94,.15), transparent 30%),
    radial-gradient(circle at top right, rgba(59,130,246,.15), transparent 30%),
    var(--bg);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.error-container{
    text-align:center;
    padding:2rem;
    max-width:600px;
}

.logo{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:2rem;
}

.logo img{
    width:60px;
    height:60px;
}

.logo span{
    font-size:2rem;
    font-weight:700;
    background:linear-gradient(135deg,var(--accent),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.error-code{
    font-size:8rem;
    font-weight:900;
    line-height:1;
    background:linear-gradient(135deg,var(--accent),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.error-title{
    font-size:2rem;
    color:var(--text);
    margin:1rem 0;
}

.error-text{
    color:var(--text-muted);
    line-height:1.7;
    margin-bottom:2rem;
}

.btn-group{
    display:flex;
    justify-content:center;
    gap:1rem;
    flex-wrap:wrap;
}

.btn{
    padding:12px 24px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--secondary));
    color:#fff;
}

.btn-outline{
    border:1px solid rgba(255,255,255,.15);
    color:#fff;
}

.btn:hover{
    transform:translateY(-3px);
}

@media(max-width:768px){

    .error-code{
        font-size:5rem;
    }

    .error-title{
        font-size:1.5rem;
    }

    .logo span{
        font-size:1.5rem;
    }
}
</style>
</head>

<body>

<div class="error-container">

    <div class="logo">
        <img src="../images/logo.webp" alt="Stackly">
        <span>Stackly</span>
    </div>

    <div class="error-code">404</div>

    <h1 class="error-title">Oops! Page Not Found</h1>

    <p class="error-text">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
    </p>

    <div class="btn-group">
        <a href="../index.html" class="btn btn-primary">
            🏠 Back to Home
        </a>

        <a href="javascript:history.back()" class="btn btn-outline">
            ← Go Back
        </a>
    </div>

</div>

</body>
</html>
